// Numeração PROGRESSIVA GLOBAL — cada cromo tem número único no álbum inteiro
var TODOS=[];
var globalNum=1;
ESCALOES.forEach(function(e){
  e.jogadores.forEach(function(pid){
    TODOS.push({pid:pid,escalao:e.key,titulo:e.titulo,raridade:e.raridade,num:globalNum});
    globalNum++;
  });
});

// Map pid -> num para acesso rápido
var PID_NUM={};
TODOS.forEach(function(j){PID_NUM[j.pid]=j.num;});

var R={comum:{label:'Comum',cor:'#aaa',glow:'rgba(180,180,180,0.3)'},rara:{label:'Rara',cor:'#F0A500',glow:'rgba(240,165,0,0.5)'},lendaria:{label:'Lendária',cor:'#e879f9',glow:'rgba(232,121,249,0.55)'}};

// Páginas do álbum: 9 slots por página, agrupadas por escalão
var PAGINAS=[];
ESCALOES.forEach(function(e){
  var slots=e.jogadores.map(function(pid){return{pid:pid,titulo:e.titulo,num:PID_NUM[pid]};});
  for(var i=0;i<slots.length;i+=9) PAGINAS.push({titulo:e.titulo,slots:slots.slice(i,i+9)});
});

// Spreads: capa + pares de páginas + contracapa
var SPREADS=[];
SPREADS.push({esq:'capa',dir:PAGINAS[0]});
for(var pi=1;pi<PAGINAS.length;pi+=2) SPREADS.push({esq:PAGINAS[pi],dir:PAGINAS[pi+1]||'contracapa'});
if(PAGINAS.length%2===0) SPREADS.push({esq:PAGINAS[PAGINAS.length-1],dir:'contracapa'});

// Estado
// ganhos: {pid: count} — quantas cópias foram ganhas
// colados: Set — pids já colados na caderneta (1 por cromo)
var S={
  ecra:'pack',pacotes:15,
  ganhos:{},   // {pid: nCopias}
  colados:new Set(),
  cartas:[],reveladas:[],todosRev:false,
  pagina:0,
  dragPid:null,dragPos:null,slotOver:null,
  mobileSel:null,
  notif:null,confetti:false,
  videoPath:'https://cbviana.com/Caderneta/openpack.mp4',
  videoDisponivel:null
};
// Helpers ganhos
function ganhoCount(pid){return S.ganhos[pid]||0;}
function ganhoAdd(pid){S.ganhos[pid]=(S.ganhos[pid]||0)+1;}
function ganhoHas(pid){return (S.ganhos[pid]||0)>0;}
// disponível para colar = ganhos mas não colados (tem pelo menos 1 cópia livre)
function ganhoDisponivel(pid){return (S.ganhos[pid]||0)>0 && !S.colados.has(pid);}
// duplicado = colado E tem cópias extra
function ganhoDup(pid){return S.colados.has(pid)&&(S.ganhos[pid]||0)>1;}
// total de pids únicos ganhos
function ganhosTotalUnicos(){return Object.keys(S.ganhos).length;}

function mk(tag,cls){var d=document.createElement(tag);if(cls)d.className=cls;return d;}

// Testa se o vídeo local está acessível
function testarVideo(cb){
  if(S.videoDisponivel!==null){cb(S.videoDisponivel);return;}
  var v=document.createElement('video');
  v.style.display='none';
  v.onerror=function(){S.videoDisponivel=false;cb(false);};
  v.oncanplay=function(){S.videoDisponivel=true;cb(true);};
  v.src=S.videoPath;
  document.body.appendChild(v);
  setTimeout(function(){if(S.videoDisponivel===null){S.videoDisponivel=false;cb(false);}},1500);
}

// ════════════════════════════════════════════════════
//  RENDER PRINCIPAL
// ════════════════════════════════════════════════════
function render(){
  var app=document.getElementById('app');
  app.innerHTML='';
  app.style.cssText='min-height:100vh;background:radial-gradient(ellipse at 50% 20%,#2e1508 0%,#160a04 60%,#080302 100%);position:relative;user-select:none;-webkit-user-select:none;';

  var st=mk('style');st.textContent=CSS;app.appendChild(st);

  if(S.confetti){app.appendChild(mkConfetti());}
  if(S.notif){var nf=mk('div','notif');nf.textContent=S.notif;app.appendChild(nf);}

  if(S.ecra==='pack') app.appendChild(mkPack());
  if(S.ecra==='reveal') app.appendChild(mkReveal());
  if(S.ecra==='album') app.appendChild(mkAlbum());
}

// ════════════════════════════════════════════════════
//  PACK — com vídeo se disponível
// ════════════════════════════════════════════════════
function mkPack(){
  var div=mk('div');
  div.appendChild(mkHdr());
  var w=mk('div','pack-wrap');

  // Tentar vídeo
  var videoEl=document.createElement('video');
  videoEl.className='pack-video';
  videoEl.src=S.videoPath;
  videoEl.autoplay=false;
  videoEl.loop=false;
  videoEl.muted=false;
  videoEl.controls=false;
  videoEl.style.cssText='display:none;width:280px;height:400px;object-fit:cover;border-radius:14px;box-shadow:0 28px 70px rgba(0,0,0,0.85);cursor:pointer;';
  videoEl.onerror=function(){videoEl.style.display='none';envEl.style.display='flex';};
  videoEl.oncanplay=function(){videoEl.style.display='block';envEl.style.display='none';S.videoDisponivel=true;};
  videoEl.onclick=function(){
    videoEl.play();
    setTimeout(function(){executarAbertura();},videoEl.duration?videoEl.duration*1000-200:2000);
  };

  // Envelope animado (fallback)
  var envEl=mk('div','pack-env');
  envEl.innerHTML='<div class="pack-pat"></div><div class="pack-band"></div><div class="pack-cnt"><div class="pt1">SELEÇÃO DISTRITAL DE</div><div class="pt2">VIANA</div><div class="pt3">Caderneta Oficial</div><div class="pt4">ÉPOCA 2025/26</div></div><div class="pack-hint2">✂ CLICA PARA ABRIR</div>';
  envEl.onclick=function(){
    envEl.style.animation='packRip 0.6s ease forwards';
    setTimeout(executarAbertura,550);
  };

  // Testar vídeo e mostrar o correcto
  videoEl.load();
  setTimeout(function(){
    if(!videoEl.error && videoEl.readyState>0){
      videoEl.style.display='block';
      envEl.style.display='none';
    }
  },800);

  w.appendChild(videoEl);
  w.appendChild(envEl);

  var h=mk('div','pack-hint');
  h.innerHTML='<span style="animation:float 2s ease-in-out infinite;display:inline-block">'+S.pacotes+' pacote'+(S.pacotes!==1?'s':'')+' disponíve'+(S.pacotes!==1?'is':'l')+'</span>';
  w.appendChild(h);

  // Callout animado
  var callout=mk('div','pack-callout');
  callout.innerHTML='<span class="pack-callout-arrow">👆</span> Clica no pacote para abrir os teus cromos';
  w.appendChild(callout);

  div.appendChild(w);
  return div;
}

// ════════════════════════════════════════════════════
//  REVEAL
// ════════════════════════════════════════════════════
function mkReveal(){
  var div=mk('div');div.style.minHeight='100vh';
  div.appendChild(mkHdr());
  var w=mk('div','reveal-wrap');
  var hint=mk('div','reveal-hint');hint.textContent=S.todosRev?'TODOS REVELADOS!':'CLICA PARA REVELAR';w.appendChild(hint);
  var cards=mk('div','reveal-cards');
  S.cartas.forEach(function(jog,i){
    var rev=S.reveladas.indexOf(i)!==-1;
    var ri=R[jog.raridade];
    var cw=mk('div','carta-wrap');
    cw.style.cssText='animation:card-enter .55s ease '+(i*110)+'ms both;';
    if(rev&&jog.raridade!=='comum'){
      var glow=mk('div','carta-glow');
      glow.style.cssText='position:absolute;inset:-8px;border-radius:18px;box-shadow:0 0 28px '+ri.glow+',0 0 56px '+ri.glow+';animation:glow-pulse 1.6s ease-in-out infinite;pointer-events:none;';cw.appendChild(glow);
      var badge=mk('div','carta-badge');
      badge.style.cssText='position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-family:Oswald,sans-serif;font-size:8px;font-weight:700;color:'+ri.cor+';letter-spacing:2px;white-space:nowrap;text-shadow:0 0 10px '+ri.glow+';animation:float 1.6s ease-in-out infinite;';
      badge.textContent=jog.raridade==='lendaria'?'★ LENDÁRIA ★':'◆ RARA ◆';cw.appendChild(badge);
    }
    var carta=mkCartaFlip(jog,rev,148,207);
    if(!rev){carta.style.cursor='pointer';carta.onclick=(function(idx){return function(){revelarCarta(idx);};})(i);}
    cw.appendChild(carta);cards.appendChild(cw);
  });
  w.appendChild(cards);
  var btns=mk('div','reveal-btns');
  if(!S.todosRev){var b=mk('button','btn');b.textContent='REVELAR TODOS';b.onclick=revelarTodos;btns.appendChild(b);}
  if(S.todosRev){
    if(S.pacotes>0){var bp=mk('button','btn btn-p');bp.textContent='🎁 PRÓXIMO PACOTE';bp.onclick=proximoPacote;btns.appendChild(bp);}
    var ba=mk('button','btn btn-p');ba.textContent='📖 VER CADERNETA →';ba.onclick=irAlbum;btns.appendChild(ba);
  }
  w.appendChild(btns);div.appendChild(w);
  return div;
}

// ════════════════════════════════════════════════════
//  ÁLBUM — maior, com background
// ════════════════════════════════════════════════════
function isPortrait(){return window.innerHeight>window.innerWidth;}

// No mobile usamos PAGINAS directamente (1 pág de cada vez)
// No desktop usamos SPREADS (2 págs lado a lado)
function totalUnidades(){return isPortrait()?PAGINAS.length+1:SPREADS.length;} // +1 para capa

function mkAlbum(){
  var div=mk('div');div.style.minHeight='100vh';
  div.appendChild(mkHdr());

  var aw=mk('div','album-wrap');

  // Progresso
  var pct=Math.round(S.colados.size/TODOS.length*100);
  var pw=mk('div','');pw.style.cssText='width:100%;max-width:1100px;padding:8px 10px 0;';

function mkPaginaAlbum(pg,lado){

    d.innerHTML='<img src="capa_album.png" style="width:100%;height:100%;object-fit:cover;object-position:center top;display:block;" onerror="this.style.display=\'none\'">';
    return d;
  }

  // ── CONTRACAPA ──
  if(pg==='contracapa'){
    d.style.cssText='width:100%;height:100%;border-radius:'+br+';overflow:hidden;position:relative;background:linear-gradient(160deg,#3a0810,#6B1525);display:flex;align-items:center;justify-content:center;';
    d.innerHTML='<div style="text-align:center"><div style="font-family:Oswald,sans-serif;font-size:16px;color:rgba(240,165,0,0.12);letter-spacing:4px;font-weight:700">CB VIANA</div><div style="font-family:Dancing Script,cursive;font-size:11px;color:rgba(240,165,0,0.07);margin-top:4px">Coleciona &middot; Troca &middot; Recorda</div></div>';
    return d;
  }

  // ── PÁGINA NORMAL: fundo court amarelo/dourado estilo PDF ──
  d.className='pag-papel '+(lado==='esq'?'p-esq':'p-dir');

  // SVG de fundo: court dourado + faixa bordô + arco + logo
  // O lobo real é inserido como <img> por cima da faixa
  // Fundo claro papel com watermark
  var bgSvg='<div style="position:absolute;inset:0;pointer-events:none;z-index:0;">'
    // fundo papel creme
    +'<div style="position:absolute;inset:0;background:linear-gradient(160deg,#f5f0e8 0%,#ede5d5 50%,#e8dfc8 100%);"></div>'
    // faixa fina bordô à esquerda

    // watermark diagonal "CB VIANA 2025/26"
    +'<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-35deg);font-family:Oswald,sans-serif;font-size:38px;font-weight:700;color:rgba(123,28,46,0.07);letter-spacing:4px;white-space:nowrap;line-height:1.3;text-align:center;">CB VIANA<br>2025/26</div>'
    +'</div>';

  d.insertAdjacentHTML('afterbegin', bgSvg);

  // Header título do escalão
  var hdr=mk('div','pag-hdr');
  hdr.innerHTML='<span class="pag-titulo">'+pg.titulo.toUpperCase()+'</span>';
  d.appendChild(hdr);

  var grid=mk('div','pag-slots');
  // Só os slots que têm jogador — sem buracos
  pg.slots.forEach(function(slot){
    if(!slot) return;
    var isColado=S.colados.has(slot.pid);
    var isOver=S.slotOver==='slot-'+slot.pid;
    var slotEl=mk('div','slot '+(isColado?'slot-cheio':'slot-vazio')+(isOver?' slot-over':''));
    slotEl.dataset.slot='slot-'+slot.pid;
    slotEl.dataset.pid=slot.pid;

      var img=document.createElement('img');
      img.className='slot-img-full';
      img.src=imgUrl(slot.pid);img.alt=nomeFmt(slot.pid);
      img.onerror=function(){this.style.display='none';};
      slotEl.appendChild(img);
      var overlay=mk('div','slot-overlay');
      overlay.innerHTML='<div class="slot-nome">'+nomeCurto(slot.pid)+'</div>';
      slotEl.appendChild(overlay);
    }
    var snum=mk('div','slot-num');snum.textContent=slot.num;slotEl.appendChild(snum);
    grid.appendChild(slotEl);

  d.appendChild(grid);
  return d;

function mkInventario(){
  var inv=mk('div','inventario');

  // disponíveis = ganhos mas não colados
  var disponiveis=TODOS.filter(function(j){return ganhoDisponivel(j.pid);});
  // duplicados = colados MAS com mais de 1 cópia (ganhou de novo depois de colar)
  var duplicados=TODOS.filter(function(j){return ganhoDup(j.pid);});

  tit.innerHTML='<span>CROMOS DISPONÍVEIS</span><span style="font-size:8px;color:#5a3a1a">'+disponiveis.length+' | '+duplicados.length+' dup</span>';
  inv.appendChild(tit);

  if(!disponiveis.length&&!duplicados.length){
    var h=mk('div','inv-hint');h.textContent='Abre pacotes para ganhar cromos';inv.appendChild(h);
  } else {
    if(disponiveis.length){
      var h2=mk('div','inv-hint');
      h2.textContent=isPortrait()?'Toca num cromo e depois no slot':'Arrasta para colar na caderneta';
      inv.appendChild(h2);

      mhint.textContent='👇 Agora toca no slot correcto da caderneta';
      mhint.style.cssText='font-family:Oswald,sans-serif;font-size:8px;color:#F0A500;text-align:center;letter-spacing:1px;opacity:0;transition:opacity .3s;margin-top:2px;';
      inv.appendChild(mhint);
      var grid=mk('div','inv-grid');
      disponiveis.forEach(function(jog){
        var c=mkCartaSimples(jog.pid,75,105);
        c.className+=' inv-carta';
        c.dataset.pid=jog.pid; // para o tap mobile
        // Highlight se este cromo está seleccionado
        if(S.mobileSel===jog.pid){
          c.style.outline='2.5px solid #F0A500';
          c.style.transform='scale(1.12) rotate(-3deg)';
          c.style.boxShadow='0 0 16px rgba(240,165,0,0.6)';
          mhint.style.opacity='1';
        }
        c.onmousedown=(function(pid){return function(e){iniciarDrag(e,pid);};})(jog.pid);
        c.ontouchstart=(function(pid){return function(e){iniciarDragTouch(e,pid);};})(jog.pid);

    if(duplicados.length){

        c.className+=' inv-carta inv-dup';
        grid2.appendChild(c);
      });
      inv.appendChild(grid2);
    }
  }
  if(S.pacotes>0){
    var sep=mk('div','');sep.style.cssText='border-top:1px solid rgba(240,165,0,0.07);padding-top:6px;margin-top:4px;';
    var b=mk('button','btn btn-p');b.style.width='100%';b.textContent='🎁 ABRIR PACOTE ('+S.pacotes+')';
    b.onclick=function(){S.ecra='pack';render();};sep.appendChild(b);inv.appendChild(sep);
  }
  return inv;
}

// ════════════════════════════════════════════════════
function executarAbertura(){
  if(S.pacotes<=0)return;
  S.pacotes--;
  var pool=[];
  TODOS.forEach(function(j){var wt=j.raridade==='lendaria'?1:j.raridade==='rara'?2:3;for(var i=0;i<wt;i++)pool.push(j);});
  var escolhidos=[],usados=new Set(),t=0;
  while(escolhidos.length<4&&t<300){t++;var p=pool[Math.floor(Math.random()*pool.length)];if(!usados.has(p.pid)){escolhidos.push(p);usados.add(p.pid);}}
  var temE=escolhidos.some(function(j){return j.raridade!=='comum';});
  if(!temE){var raras=TODOS.filter(function(j){return j.raridade!=='comum';});if(raras.length)escolhidos[3]=raras[Math.floor(Math.random()*raras.length)];}
  S.cartas=escolhidos;S.reveladas=[];S.todosRev=false;S.ecra='reveal';render();
}

function abrirPacote(){executarAbertura();}

function revelarCarta(idx){
  if(S.reveladas.indexOf(idx)!==-1)return;
  S.reveladas.push(idx);
  var jog=S.cartas[idx];
  ganhoAdd(jog.pid);
  if(jog.raridade==='lendaria'){S.confetti=true;setTimeout(function(){S.confetti=false;render();},2500);}
  S.todosRev=S.reveladas.length===S.cartas.length;
  render();
}

function revelarTodos(){
  S.cartas.forEach(function(jog,i){if(S.reveladas.indexOf(i)===-1){S.reveladas.push(i);ganhoAdd(jog.pid);}});
  if(S.cartas.some(function(j){return j.raridade==='lendaria';})){S.confetti=true;setTimeout(function(){S.confetti=false;render();},2500);}
  S.todosRev=true;render();
}

function irAlbum(){S.ecra='album';render();}
function notif(txt){S.notif=txt;setTimeout(function(){S.notif=null;render();},2400);}

// ════════════════════════════════════════════════════
//  PAGE FLIP — animação real de página a virar
// ════════════════════════════════════════════════════
function flipPagina(dir, spreadEl){
  var novaPag=S.pagina+dir;
  if(novaPag<0||novaPag>=SPREADS.length) return;

  var book=spreadEl.querySelector('.album-book');
  if(!book){S.pagina=novaPag;render();return;}

  // Criar overlay da página a virar por cima do livro
  var flipEl=document.createElement('div');
  var bookRect=book.getBoundingClientRect();
  var spreadRect=spreadEl.getBoundingClientRect();
  var pageW=(bookRect.width-14)/2; // menos a lombada
  var pageH=bookRect.height;

  // O flip vai da página que sai (dir>0: página direita vira para esquerda)
  flipEl.style.cssText=[
    'position:absolute',
    'top:0',
    dir>0 ? 'left:'+(pageW+14)+'px' : 'left:0',
    'width:'+pageW+'px',
    'height:'+pageH+'px',
    'background:linear-gradient(to right, #f8edd8, #fef6e8)',
    'border-radius:'+(dir>0?'0 12px 12px 0':'12px 0 0 12px'),
    'transform-origin:'+(dir>0?'left center':'right center'),
    'transform:rotateY(0deg)',
    'transform-style:preserve-3d',
    'backface-visibility:hidden',
    'z-index:20',
    'pointer-events:none',
    'will-change:transform',
    'box-shadow:'+(dir>0?'-4px 0 12px rgba(0,0,0,0.18)':'4px 0 12px rgba(0,0,0,0.18)'),
    'overflow:hidden',
  ].join(';');

  // Sombra dinâmica que cresce durante o flip
  var shadow=document.createElement('div');
  shadow.style.cssText='position:absolute;inset:0;background:'+(dir>0?'linear-gradient(to right,rgba(0,0,0,0.18),transparent)':'linear-gradient(to left,rgba(0,0,0,0.18),transparent)')+';opacity:0;transition:opacity 0.22s;';
  flipEl.appendChild(shadow);

  // Gradiente de curvatura no meio da página (efeito 3D)
  var curl=document.createElement('div');
  curl.style.cssText='position:absolute;top:0;bottom:0;width:30px;'+(dir>0?'left:0':'right:0')+';background:'+(dir>0?'linear-gradient(to right,rgba(0,0,0,0.12),transparent)':'linear-gradient(to left,rgba(0,0,0,0.12),transparent)')+';opacity:0;';
  flipEl.appendChild(curl);

  spreadEl.style.perspective='1400px';
  spreadEl.style.perspectiveOrigin='center center';
  spreadEl.appendChild(flipEl);

  var duration=480;
  var startAngle=0;
  var endAngle=dir>0?-180:180;
  var start=null;

  function ease(t){return t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}

  function step(ts){
    if(!start) start=ts;
    var p=Math.min((ts-start)/duration,1);
    var ep=ease(p);
    var angle=startAngle+(endAngle-startAngle)*ep;
    flipEl.style.transform='rotateY('+angle+'deg)';
    // Sombra máxima a meio do flip
    var shadowOp=Math.sin(p*Math.PI)*0.55;
    shadow.style.opacity=shadowOp;
    curl.style.opacity=Math.sin(p*Math.PI)*0.7;

    if(p<1){
      requestAnimationFrame(step);
    } else {
      // Fim da animação — mudar página e remover overlay
      if(spreadEl.contains(flipEl)) spreadEl.removeChild(flipEl);
      spreadEl.style.perspective='';
      S.pagina=novaPag;
      render();
    }
  }

  // Mudar página a meio do flip para parecer que tem conteúdo nos dois lados
  setTimeout(function(){
    // Pintar o flip com cor da nova página a partir de metade
    if(dir>0){
      flipEl.style.background='linear-gradient(to left, #fef6e8, #f0e4c8)';
    } else {
      flipEl.style.background='linear-gradient(to right, #fef6e8, #f0e4c8)';
    }
  }, duration*0.45);

  requestAnimationFrame(step);
}

// ════════════════════════════════════════════════════
//  DRAG
// ════════════════════════════════════════════════════
var ghostEl=null;

function setupDragListeners(){
  if(window._cbvDragInit) return;
  window._cbvDragInit=true;

  ghostEl=document.createElement('div');
  ghostEl.id='cbv-ghost';
  ghostEl.style.cssText='position:fixed;z-index:9999;pointer-events:none;display:none;transform:rotate(-4deg) scale(1.08);filter:drop-shadow(0 8px 24px rgba(240,165,0,0.5));transition:none;';
  document.body.appendChild(ghostEl);

  window.addEventListener('mousemove',function(e){
    if(!S.dragPid) return;
    S.dragPos={x:e.clientX,y:e.clientY};
    moveGhost(e.clientX,e.clientY);
    updateSlotHighlight(e.clientX,e.clientY);
  });

  window.addEventListener('mouseup',function(e){
    if(!S.dragPid) return;
    var pid=S.dragPid;
    S.dragPid=null;S.dragPos=null;S.slotOver=null;
    hideGhost();clearSlotHighlight();
    var el2=document.elementFromPoint(e.clientX,e.clientY);
    var slotEl=el2&&el2.closest?el2.closest('[data-slot]'):null;
    if(slotEl){
      var targetPid=slotEl.getAttribute('data-pid');
      if(targetPid&&targetPid.trim()===pid.trim()&&!S.colados.has(pid)){
        S.colados.add(pid);
        notif('📌 '+nomeCurto(pid)+' colado!');
      } else if(S.colados.has(pid)){
        notif('✅ Já colado!');
      } else {
        notif('❌ Lugar errado!');
      }
    }
    render();
  });

  window.addEventListener('touchmove',function(e){
    if(!S.dragPid) return;
    e.preventDefault();
    var t=e.touches[0];
    S.dragPos={x:t.clientX,y:t.clientY};
    moveGhost(t.clientX,t.clientY);
    updateSlotHighlight(t.clientX,t.clientY);
  },{passive:false});

  window.addEventListener('touchend',function(e){
    if(!S.dragPid) return;
    var pid=S.dragPid;
    S.dragPid=null;S.dragPos=null;S.slotOver=null;
    hideGhost();clearSlotHighlight();
    var t=e.changedTouches[0];
    var el2=document.elementFromPoint(t.clientX,t.clientY);
    var slotEl=el2&&el2.closest?el2.closest('[data-slot]'):null;
    if(slotEl&&slotEl.dataset.pid===pid&&!S.colados.has(pid)){
      S.colados.add(pid);notif('📌 '+nomeCurto(pid)+' colado!');
    }
    render();
  });
}

function moveGhost(x,y){if(!ghostEl)return;ghostEl.style.left=(x-50)+'px';ghostEl.style.top=(y-70)+'px';ghostEl.style.display='block';}
function hideGhost(){if(ghostEl)ghostEl.style.display='none';}
function updateSlotHighlight(x,y){
  var el2=document.elementFromPoint(x,y);
  var slot=el2&&el2.closest?el2.closest('[data-slot]'):null;
  var newSlot=slot?slot.dataset.slot:null;
  if(newSlot!==S.slotOver){clearSlotHighlight();S.slotOver=newSlot;if(newSlot){var slotEl=document.querySelector('[data-slot="'+newSlot+'"]');if(slotEl)slotEl.classList.add('slot-over');}}
}
function clearSlotHighlight(){document.querySelectorAll('.slot-over').forEach(function(s){s.classList.remove('slot-over');});}

function iniciarDrag(e,pid){
  e.preventDefault();
  S.dragPid=pid;S.dragPos={x:e.clientX,y:e.clientY};
  if(ghostEl){ghostEl.innerHTML='';var c=mkCartaSimples(pid,100,140);ghostEl.appendChild(c);moveGhost(e.clientX,e.clientY);}
}
function iniciarDragTouch(e,pid){
  var t=e.touches[0];S.dragPid=pid;S.dragPos={x:t.clientX,y:t.clientY};
  if(ghostEl){ghostEl.innerHTML='';var c=mkCartaSimples(pid,100,140);ghostEl.appendChild(c);moveGhost(t.clientX,t.clientY);}
}

// Aplicar background image às páginas de papel ao renderizar

  imgs.forEach(function(el){

// ════════════════════════════════════════════════════
//  MOBILE TAP-TO-PLACE
//  Toca cromo no inventário → fica seleccionado (brilha)
//  Toca no slot correcto → cola
// ════════════════════════════════════════════════════
function setupMobileTap(){
  if(!isPortrait()) return;

  // Seleccionar cromo do inventário por tap
  document.querySelectorAll('.inv-carta').forEach(function(el){
    el.addEventListener('click',function(e){
      e.stopPropagation();
      var pid=el.dataset.pid||el.querySelector('[data-pid]')&&el.querySelector('[data-pid]').dataset.pid;
      // Encontrar o pid — está guardado no dataset do elemento pai ou no filho
      // Vamos usar uma abordagem simples: guardar nos elementos ao criar
      if(!pid) return;
      if(S.mobileSel===pid){
        S.mobileSel=null; // deseleccionar
      } else {
        S.mobileSel=pid;
      }
      // Actualizar visual sem re-render completo
      document.querySelectorAll('.inv-carta').forEach(function(c){
        c.style.outline=c===el&&S.mobileSel?'2.5px solid #F0A500':'none';
        c.style.transform=c===el&&S.mobileSel?'scale(1.12) rotate(-3deg)':'';
        c.style.boxShadow=c===el&&S.mobileSel?'0 0 16px rgba(240,165,0,0.6)':'';
      });
      // Mostrar hint
      var hint=document.querySelector('.mobile-tap-hint');
      if(hint) hint.style.opacity=S.mobileSel?'1':'0';
    });
  });

  // Tap num slot para colar o cromo seleccionado
  document.querySelectorAll('[data-slot]').forEach(function(slotEl){
    slotEl.addEventListener('click',function(e){
      if(!S.mobileSel) return;
      e.stopPropagation();
      var targetPid=slotEl.getAttribute('data-pid');
      if(targetPid===S.mobileSel&&!S.colados.has(S.mobileSel)){
        S.colados.add(S.mobileSel);
        var nome=nomeCurto(S.mobileSel);
        S.mobileSel=null;
        notif('📌 '+nome+' colado!');
      } else if(S.colados.has(S.mobileSel)){
        notif('✅ Já colado!');
        S.mobileSel=null;
      } else {
        notif('❌ Lugar errado!');
      }
      render();
    });
  });
}

window.addEventListener('orientationchange',function(){setTimeout(render,150);});
window.addEventListener('resize',function(){
  // só re-render se mudou entre portrait/landscape
  var p=isPortrait();
  if(p!==window._lastPortrait){window._lastPortrait=p;render();}
});
window._lastPortrait=isPortrait();

render();
</script>
