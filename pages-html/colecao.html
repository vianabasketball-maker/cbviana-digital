<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Minha Colecção — CB Viana</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--gold:#F0A500;--gold-bright:#FFD060;--wine:#7B1C2E;--wine-mid:#9b2438;--bg:#060109;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;color:#fff;}

#mesh{position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 70% 60% at 15% 15%,rgba(123,28,46,.28) 0%,transparent 55%),
    radial-gradient(ellipse 50% 40% at 85% 85%,rgba(240,165,0,.09) 0%,transparent 55%),
    #060109;
}
#stars{position:fixed;inset:0;z-index:0;overflow:hidden;}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--d,3s) ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:.06;}50%{opacity:.4;}}

#app{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:32px 16px 60px;}

/* HEADER */
.hdr{text-align:center;margin-bottom:32px;}
.hdr-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(240,165,0,0.07);border:0.5px solid rgba(240,165,0,0.22);border-radius:40px;padding:5px 14px;font-size:9px;font-weight:600;letter-spacing:3px;color:rgba(240,165,0,.6);text-transform:uppercase;margin-bottom:12px;}
.hdr-title{font-family:'Playfair Display',serif;font-size:48px;font-weight:900;background:linear-gradient(160deg,var(--gold-bright),var(--gold),rgba(200,120,0,.85));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;}
.hdr-sub{font-size:11px;font-weight:300;letter-spacing:2px;color:rgba(255,255,255,.2);text-transform:uppercase;}

/* STATS */
.stats-bar{display:flex;gap:12px;justify-content:center;margin-bottom:28px;flex-wrap:wrap;}
.stat-card{background:rgba(255,255,255,.025);border:0.5px solid rgba(240,165,0,.12);border-radius:14px;padding:12px 20px;text-align:center;}
.stat-val{font-family:'Playfair Display',serif;font-size:28px;font-weight:900;color:var(--gold);}
.stat-lbl{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.25);margin-top:2px;}

/* FILTROS */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px;justify-content:center;}
.filter-btn{padding:6px 14px;border-radius:20px;border:0.5px solid rgba(240,165,0,.2);background:transparent;color:rgba(240,165,0,.5);font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;}
.filter-btn:hover,.filter-btn.active{background:rgba(240,165,0,.1);border-color:var(--gold);color:var(--gold);}

/* GRID DE CARTAS */
#colecao-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px;}

.carta{
  border-radius:16px;overflow:hidden;
  border:1.5px solid rgba(240,165,0,.15);
  background:linear-gradient(160deg,#0c0420,#150830);
  transition:transform .2s,border-color .2s,box-shadow .2s;
  cursor:default;
  animation:cardIn .4s ease both;
}
@keyframes cardIn{from{opacity:0;transform:scale(.9) translateY(10px);}to{opacity:1;transform:scale(1) translateY(0);}}
.carta:hover{transform:translateY(-4px);border-color:rgba(240,165,0,.4);box-shadow:0 8px 24px rgba(240,165,0,.15);}
.carta-img{width:100%;aspect-ratio:4/5;object-fit:cover;object-position:top;display:block;}
.carta-img-placeholder{width:100%;aspect-ratio:4/5;background:linear-gradient(135deg,var(--wine),rgba(60,10,80,.4));display:flex;align-items:center;justify-content:center;font-size:32px;}
.carta-info{padding:10px 10px 12px;}
.carta-categoria{font-size:8px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(240,165,0,.5);margin-bottom:4px;}
.carta-nome{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:#fff;line-height:1.3;margin-bottom:6px;}
.carta-footer{display:flex;justify-content:space-between;align-items:center;}
.carta-moedas{font-size:12px;font-weight:700;color:var(--gold);}
.carta-data{font-size:9px;color:rgba(255,255,255,.25);}

/* VAZIO */
#empty{display:none;text-align:center;padding:60px 20px;}
#empty .e-icon{font-size:48px;margin-bottom:16px;}
#empty .e-title{font-family:'Playfair Display',serif;font-size:24px;color:var(--gold);margin-bottom:8px;}
#empty .e-sub{font-size:13px;color:rgba(255,255,255,.3);line-height:1.6;}
#empty a{color:var(--gold);text-decoration:none;}

/* LOADING */
#loading{text-align:center;padding:60px;color:rgba(240,165,0,.4);font-size:13px;letter-spacing:2px;}
.spin{display:inline-block;width:24px;height:24px;border:2px solid rgba(240,165,0,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:10px;}
@keyframes spin{to{transform:rotate(360deg);}}

@media(max-width:480px){
  .hdr-title{font-size:36px;}
  #colecao-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;}
}
@keyframes toastSlide{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div id="mesh"></div>
<div id="stars"></div>

<div id="app">
  <div class="hdr">
    <div class="hdr-badge">CB Viana · O Teu Perfil</div>
    <div class="hdr-title">A Minha Colecção</div>
    <div class="hdr-sub">Raspadinhas diárias · Jogadores e staff</div>
  </div>

  <!-- Banner raspadinhas pendentes -->
  <div id="pending-banner" style="display:none;background:linear-gradient(135deg,#7B1C2E,#9b2438);border:1.5px solid #F0A500;border-radius:16px;padding:16px 20px;text-align:center;margin-bottom:20px;animation:toastSlide .4s ease;">
    <div style="font-size:24px;margin-bottom:6px;">🎰</div>
    <div style="font-size:14px;font-weight:700;color:#F0A500;" id="pending-title">Tens raspadinhas por raspar!</div>
    <div style="font-size:12px;color:rgba(255,255,255,.6);margin:4px 0 12px;">Não percas os teus prémios diários.</div>
    <a href="/raspadinha/" style="background:#F0A500;color:#7B1C2E;font-weight:700;font-size:13px;padding:10px 24px;border-radius:10px;text-decoration:none;display:inline-block;">Raspar agora →</a>
  </div>
  
   
<div class="stats-bar" id="stats-bar">
    <div class="stat-card"><div class="stat-val" id="stat-total">—</div><div class="stat-lbl">Cartas</div></div>
    <div class="stat-card"><div class="stat-val" id="stat-moedas">—</div><div class="stat-lbl">Moedas ganhas</div></div>
    <div class="stat-card"><div class="stat-val" id="stat-streak">—</div><div class="stat-lbl">Dias seguidos</div></div>
  </div>

  <div class="filters" id="filters"></div>

  <div id="loading"><div class="spin"></div><br>A carregar...</div>
  <div id="empty">
    <div class="e-icon">🎰</div>
    <div class="e-title">Colecção vazia</div>
    <div class="e-sub">Ainda não tens raspadinhas.<br><a href="/raspadinha/">Joga a tua primeira raspadinha →</a></div>
  </div>
  <div id="colecao-grid"></div>
</div>

<script>
(function(){
  // Stars
  var s=document.getElementById('stars');
  for(var i=0;i<50;i++){
    var el=document.createElement('div');el.className='star';
    var sz=Math.random()*1.5+.3;
    el.style.cssText='left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;width:'+sz+'px;height:'+sz+'px;--d:'+(2+Math.random()*5)+'s;animation-delay:'+(Math.random()*5)+'s;';
    s.appendChild(el);
  }

  var CAT_LABELS={
    'fotos/Treinadores':'Treinadores',
    'fotos/Senior_Femi':'Séniores Fem.',
    'fotos/Senior_Masc':'Séniores Masc.',
    'fotos/Sub_18_Femi':'Sub-18 Fem.',
    'fotos/Sub_18_Masc':'Sub-18 Masc.',
    'fotos/Sub_16_Femi':'Sub-16 Fem.',
    'fotos/Sub_16_Masc':'Sub-16 Masc.',
    'fotos/Sub_14_Femi':'Sub-14 Fem.',
    'fotos/Sub_14_Masc':'Sub-14 Masc.',
    'fotos/Mini_12_Femi':'Mini-12 Fem.',
    'fotos/Mini_12_Masc':'Mini-12 Masc.',
    'fotos/Mini_10_Femi':'Mini-10 Fem.',
    'fotos/Mini_10_Masc':'Mini-10 Masc.',
    'fotos/Mini_8_Femi':'Mini-8 Fem.',
    'fotos/Mini_8_Masc':'Mini-8 Masc.',
    'fotos/Baby_Basket_Masc':'Baby Basket',
  };

  var colecao=[], filtroActivo='todos';

  function formatDate(d){
    var parts=d.split('-');
    return parts[2]+'/'+parts[1]+'/'+parts[0];
  }

  function calcStreak(col){
    if(!col.length) return 0;
    var hoje=new Date(); hoje.setHours(0,0,0,0);
    var streak=0;
    var datas=col.map(function(c){
      var p=c.data.split('-');
      var d=new Date(p[0],p[1]-1,p[2]);
      return d.getTime();
    });
    var unique=[...new Set(datas)].sort(function(a,b){return b-a;});
    var dia=hoje.getTime();
    for(var i=0;i<unique.length;i++){
      if(unique[i]===dia||(i===0&&unique[i]===dia-86400000)){
        streak++;
        dia=unique[i]-86400000;
      } else break;
    }
    return streak;
  }

  function renderStats(){
    var totalMoedas=colecao.reduce(function(s,c){return s+(c.moedas||0);},0);
    document.getElementById('stat-total').textContent=colecao.length;
    document.getElementById('stat-moedas').textContent=totalMoedas+'🪙';
    document.getElementById('stat-streak').textContent=calcStreak(colecao)+'d';
  }

  function renderFilters(){
    var cats=['todos'];
    colecao.forEach(function(c){if(c.categoria&&cats.indexOf(c.categoria)===-1)cats.push(c.categoria);});
    var wrap=document.getElementById('filters');
    wrap.innerHTML='';
    cats.forEach(function(cat){
      var btn=document.createElement('button');
      btn.className='filter-btn'+(cat===filtroActivo?' active':'');
      btn.textContent=cat==='todos'?'Todas ('+colecao.length+')':((CAT_LABELS[cat]||cat)+' ('+colecao.filter(function(c){return c.categoria===cat;}).length+')');
      btn.onclick=function(){
        filtroActivo=cat;
        renderFilters();
        renderGrid();
      };
      wrap.appendChild(btn);
    });
  }

  function renderGrid(){
    var grid=document.getElementById('colecao-grid');
    grid.innerHTML='';
    var items=filtroActivo==='todos'?colecao:colecao.filter(function(c){return c.categoria===filtroActivo;});

    if(!items.length){
      document.getElementById('empty').style.display='block';
      return;
    }
    document.getElementById('empty').style.display='none';

    items.forEach(function(c,i){
      var div=document.createElement('div');
      div.className='carta';
      div.style.animationDelay=(i*30)+'ms';

      var imgHtml=c.url?
        '<img class="carta-img" src="'+c.url+'" alt="'+c.nome+'" loading="lazy" onerror="this.parentNode.innerHTML=\'<div class=carta-img-placeholder>🏀</div>\'">' :
        '<div class="carta-img-placeholder">🏀</div>';

      div.innerHTML=
        imgHtml+
        '<div class="carta-info">'+
          '<div class="carta-categoria">'+(CAT_LABELS[c.categoria]||c.categoria||'—')+'</div>'+
          '<div class="carta-nome">'+(c.nome||'Jogador CB Viana')+'</div>'+
          '<div class="carta-footer">'+
            '<span class="carta-moedas">+'+c.moedas+'🪙</span>'+
            '<span class="carta-data">'+formatDate(c.data)+'</span>'+
          '</div>'+
        '</div>';
      grid.appendChild(div);
    });
  }

  // Carregar colecção
  fetch('/wp-json/cbv/v1/colecao',{credentials:'include'})
    .then(function(r){return r.json();})
    .then(function(d){
      document.getElementById('loading').style.display='none';
      if(d.code){
        // Não autenticado
        document.getElementById('empty').style.display='block';
        document.getElementById('empty').innerHTML='<div class="e-icon">🔒</div><div class="e-title">Acesso restrito</div><div class="e-sub">Faz <a href="/login/">login</a> para ver a tua colecção.</div>';
        return;
      }
      colecao=d.colecao||[];
      // Mostrar banner pendentes
      var pendentes=d.pendentes||0;
      if(pendentes>0){
        var banner=document.getElementById('pending-banner');
        banner.style.display='block';
        document.getElementById('pending-title').textContent=
          pendentes>1?'Tens '+pendentes+' raspadinhas por raspar!':'Tens 1 raspadinha por raspar!';
      }
      renderStats();
      renderFilters();
      renderGrid();
    })
    .catch(function(){
      document.getElementById('loading').style.display='none';
      document.getElementById('empty').style.display='block';
    });

})();
</script>
</body>
</html>
