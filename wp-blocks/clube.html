<p>const CLOUD = 'https://res.cloudinary.com/dmwwjylsw/image/upload';<br />
const FOLDER = '';</p>
<p>/* Cache dos public_ids reais buscados via API Cloudinary */<br />
let _assetMap = null;</p>
<p>async function getAssetMap() {<br />
  if (_assetMap) return _assetMap;<br />
  try {<br />
    const r = await fetch(`https://res.cloudinary.com/dmwwjylsw/image/list/all.json`);<br />
    const data = await r.json();<br />
    _assetMap = {};<br />
    (data.resources || []).forEach(a => {<br />
      // Remove pasta e sufixo aleatório do Cloudinary<br />
      const base = a.public_id<br />
        .replace(/^clube\//, '')<br />
        .replace(/_[a-z0-9]{4,8}$/i, '');<br />
      _assetMap[base] = a.public_id;<br />
      // Também mapear sem extensão (para PNGs uploaded como PNG)<br />
      const baseNoExt = base.replace(/\.(png|jpg|jpeg|webp)$/i, '');<br />
      if(baseNoExt !== base) _assetMap[baseNoExt] = a.public_id;<br />
    });<br />
  } catch(e) {<br />
    _assetMap = {};<br />
  }<br />
  return _assetMap;<br />
}</p>
<p>function cloudImg(nome, w=800) {<br />
  if (_assetMap && _assetMap[nome]) {<br />
    return `${CLOUD}/w_${w},q_auto,f_auto/${_assetMap[nome]}`;<br />
  }<br />
  // Tentar sem e com extensão<br />
  const base = nome.replace(/\.(png|jpg|jpeg)$/i,'');<br />
  if (_assetMap && _assetMap[base]) {<br />
    return `${CLOUD}/w_${w},q_auto,f_auto/${_assetMap[base]}`;<br />
  }<br />
  const path = FOLDER ? `${FOLDER}/${nome}` : nome;<br />
  return `${CLOUD}/w_${w},q_auto,f_auto/${path}`;<br />
}</p>

    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));<br />
    e.target.classList.add('active');<br />
    const tipo = e.target.dataset.tipo;<br />
    document.querySelectorAll('.palm-card').forEach(c => {<br />
      c.style.display = (tipo === 'todos' || c.dataset.tipo === tipo) ? '' : 'none';<br />
    });<br />
  });</p>
<p>  /* momentos */<br />
  if (CONFIG.secoes.momentos) {<br />

              <img src="${imgUrl}" alt="${g.legenda}" loading="lazy"
                onerror="this.parentNode.outerHTML='

        }).join('')}

    // Guardar lista para lightbox<br />

      src: cloudImg(g.imagem, 1200),<br />

    }));<br />
  }</p>
<p>  /* imprensa */<br />
  if (CONFIG.secoes.imprensa) {<br />
    setHTML('imprensa-grid', CONFIG.imprensa.map(n =><br />
      `</p>
<div class="news-card">

          ${n.imagem<br />

                onerror="this.parentNode.innerHTML='

            : `</p>

<p>  /* valores */<br />
  const icons = [<br />
    '<path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/>',<br />
    '<circle cx="12" cy="12" r="10"/><path d="M9 12l2 2 4-4"/>',<br />
    '<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>',<br />
    '<path d="M22 12h-4l-3 9L9 3l-3 9H2"/>',<br />

<p>/* ── SCROLL ANIMATIONS ── */<br />
function initObserver() {<br />
  const obs = new IntersectionObserver((entries) => {<br />
    entries.forEach(e => {<br />
      if (e.isIntersecting) {<br />
        e.target.classList.add('visible');<br />
        obs.unobserve(e.target);<br />
      }<br />
    });<br />
  }, { threshold: 0.1 });<br />
  document.querySelectorAll('.fade-in, .tl-item').forEach(el => obs.observe(el));<br />
}</p>
<p>/* ── HELPER: set com verificação de null ── */<br />
function setHTML(id, html) {<br />
  const el = document.getElementById(id);<br />
  if (el) el.innerHTML = html;<br />
}<br />
function setText(id, text) {<br />
  const el = document.getElementById(id);<br />
  if (el) el.textContent = text;<br />
}<br />
function setStyle(id, prop, val) {<br />
  const el = document.getElementById(id);<br />
  if (el) el.style[prop] = val;<br />
}<br />
function addClass(id, cls) {<br />
  const el = document.getElementById(id);<br />
  if (el) el.classList.add(cls);<br />
}</p>
<p>/* ── RENDER SEGURO ── */<br />
function renderSafe() {<br />
  try { render(); } catch(e) { console.warn('CBViana render error:', e); }<br />
}</p>
<p>/* ── INIT — aguarda DOM + Cloudinary asset list ── */<br />
async function init() {<br />
  await getAssetMap(); /* busca public_ids reais da pasta clube/ */<br />
  renderSafe();<br />
  setTimeout(initLightbox, 300);<br />
  initObserver();<br />
  const loading = document.getElementById('loading');<br />
  const app = document.getElementById('app');<br />
  if (loading) { loading.style.opacity = '0'; setTimeout(() => loading.style.display = 'none', 500); }<br />
  if (app) setTimeout(() => app.style.opacity = '1', 100);<br />
}</p>
<p>if (document.readyState === 'loading') {<br />
  document.addEventListener('DOMContentLoaded', init);<br />
} else {<br />
  init();<br />
}</p>
<p>/* ── LIGHTBOX ENGINE ── */<br />
let _lbItems = [];<br />
let _lbIndex = 0;</p>
<p>function openLightbox(items, index) {<br />
  _lbItems = items;<br />
  _lbIndex = index;<br />
  showLbItem();<br />
  document.getElementById('lightbox').classList.add('open');<br />
  document.body.style.overflow = 'hidden';<br />
}</p>
<p>function showLbItem() {<br />
  const item = _lbItems[_lbIndex];<br />
  document.getElementById('lightbox-img').src = item.src;<br />
  document.getElementById('lightbox-caption').textContent = item.caption || '';<br />
  document.getElementById('lightbox-counter').textContent =<br />
    `${_lbIndex + 1} / ${_lbItems.length}`;<br />
  const prev = document.getElementById('lightbox-prev');<br />
  const next = document.getElementById('lightbox-next');<br />
  prev.style.opacity = _lbItems.length > 1 ? '1' : '0';<br />
  next.style.opacity = _lbItems.length > 1 ? '1' : '0';<br />
}</p>
<p>function closeLightbox() {<br />
  document.getElementById('lightbox').classList.remove('open');<br />
  document.body.style.overflow = '';<br />
}</p>
<p>document.getElementById('lightbox-close').addEventListener('click', closeLightbox);<br />
document.getElementById('lightbox').addEventListener('click', function(e) {<br />
  if (e.target === this) closeLightbox();<br />
});<br />
document.getElementById('lightbox-prev').addEventListener('click', function(e) {<br />
  e.stopPropagation();<br />
  _lbIndex = (_lbIndex - 1 + _lbItems.length) % _lbItems.length;<br />
  showLbItem();<br />
});<br />
document.getElementById('lightbox-next').addEventListener('click', function(e) {<br />
  e.stopPropagation();<br />
  _lbIndex = (_lbIndex + 1) % _lbItems.length;<br />
  showLbItem();<br />
});<br />
document.addEventListener('keydown', function(e) {<br />
  const lb = document.getElementById('lightbox');<br />
  if (!lb.classList.contains('open')) return;<br />
  if (e.key === 'Escape') closeLightbox();<br />
  if (e.key === 'ArrowLeft') { _lbIndex = (_lbIndex - 1 + _lbItems.length) % _lbItems.length; showLbItem(); }<br />
  if (e.key === 'ArrowRight') { _lbIndex = (_lbIndex + 1) % _lbItems.length; showLbItem(); }<br />
});</p>
<p>/* Ativar lightbox nas galerias e palmares após render */<br />
function initLightbox() {<br />
  /* Galeria Momentos */<br />
  const galeriaItems = document.querySelectorAll('#momentos-grid .galeria-item img');<br />
  const galeriaList = Array.from(galeriaItems).map(img => ({<br />
    src: img.src.replace(/w_\d+/, 'w_1600'),<br />
    caption: img.alt<br />
  }));<br />
  galeriaItems.forEach((img, i) => {<br />
    img.parentElement.addEventListener('click', () => openLightbox(galeriaList, i));<br />
  });</p>
<p>  /* Palmarés */<br />
  const palmItems = document.querySelectorAll('#palmares-grid .palm-card img');<br />
  const palmList = Array.from(palmItems).map(img => ({<br />
    src: img.src.replace(/w_\d+/, 'w_1600'),<br />
    caption: img.closest('.palm-card')?.querySelector('.palm-titulo')?.textContent || ''<br />
  }));<br />
  palmItems.forEach((img, i) => {<br />
    img.closest('.palm-card').addEventListener('click', () => openLightbox(palmList, i));<br />
  });</p>
<p>  /* Imprensa */<br />
  const newsItems = document.querySelectorAll('#imprensa-grid .news-card img');<br />
  const newsList = Array.from(newsItems).map(img => ({<br />
    src: img.src.replace(/w_\d+/, 'w_1600'),<br />
    caption: img.closest('.news-card')?.querySelector('.news-headline')?.textContent || ''<br />
  }));<br />
  newsItems.forEach((img, i) => {<br />
    img.closest('.news-card').addEventListener('click', () => openLightbox(newsList, i));<br />
  });<br />
}</p>
<p></script><br /><br /></p>
